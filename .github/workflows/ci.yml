name: CI Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      AUTH_GOOGLE_ID: ci-dummy-google-id
      AUTH_GOOGLE_SECRET: ci-dummy-google-secret
      AUTH_SECRET: ci-dummy-auth-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg AUTH_GOOGLE_ID=ci-dummy-google-id \
            --build-arg AUTH_GOOGLE_SECRET=ci-dummy-google-secret \
            --build-arg AUTH_SECRET=ci-dummy-auth-secret \
            -t vocca-app .
